<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Endpoints — Pharmacogen</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/docs/theme.css">
  <style>
    :root {
      --pg-bg: #0c0c0e;
      --pg-bg-secondary: #16161a;
      --pg-accent: #14b8a6;
      --pg-accent-muted: rgba(20, 184, 166, 0.15);
      --pg-text: #fafafa;
      --pg-text-secondary: #a1a1aa;
      --pg-border: rgba(255, 255, 255, 0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--pg-bg); color: var(--pg-text); min-height: 100vh; }
    .site-header {
      background: var(--pg-bg-secondary);
      border-bottom: 1px solid var(--pg-border);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .site-header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    .site-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--pg-text);
      text-decoration: none;
    }
    .gene-logo { width: 28px; height: 28px; flex-shrink: 0; }
    .site-nav { display: flex; gap: 8px; }
    .site-nav a {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      color: var(--pg-text-secondary);
      text-decoration: none;
      border-radius: 6px;
      transition: all 0.15s;
    }
    .site-nav a:hover { color: var(--pg-text); background: rgba(255,255,255,0.05); }
    .site-nav a.active { background: var(--pg-accent-muted); color: var(--pg-accent); }
    #swagger-ui { padding: 24px; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="/docs" class="site-logo">
        <svg class="gene-logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 4c2 4 2 8 2 12s0 8-2 12M22 4c-2 4-2 8-2 12s0 8 2 12" stroke="#14b8a6" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M10 8h12M10 16h12M10 24h12" stroke="#14b8a6" stroke-width="1.2" stroke-linecap="round"/>
          <circle cx="10" cy="8" r="1.5" fill="#14b8a6"/><circle cx="22" cy="8" r="1.5" fill="#14b8a6"/>
          <circle cx="10" cy="16" r="1.5" fill="#14b8a6"/><circle cx="22" cy="16" r="1.5" fill="#14b8a6"/>
          <circle cx="10" cy="24" r="1.5" fill="#14b8a6"/><circle cx="22" cy="24" r="1.5" fill="#14b8a6"/>
        </svg>
        Pharmacogen API
      </a>
      <nav class="site-nav">
        <a href="/docs">Home</a>
        <a href="/docs/api" class="active">API Endpoints</a>
        <a href="/docs#setup">Setup Guide</a>
        <a href="/docs#run">Run Guide</a>
        <a href="/demo">Demo</a>
      </nav>
    </div>
  </header>

  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
  <script>
    window.ui = SwaggerUIBundle({
      url: '/openapi.json',
      dom_id: '#swagger-ui',
      deepLinking: true,
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
      layout: 'StandaloneLayout',
      defaultModelsExpandDepth: 0,
      docExpansion: 'list',
      filter: true,
      syntaxHighlight: { theme: 'monokai' },
      tryItOutEnabled: true
    });
  </script>
</body>
</html>
