<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Endpoints — GeneAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/docs/theme.css">
  <style>
    :root {
      --pg-bg: #f0f0f0;
      --pg-bg-secondary: #ffffff;
      --pg-accent: #1a1a1a;
      --pg-accent-muted: rgba(0, 0, 0, 0.08);
      --pg-text: #1a1a1a;
      --pg-text-secondary: #555;
      --pg-border: rgba(0, 0, 0, 0.07);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', 'Helvetica Neue', sans-serif; background: var(--pg-bg); color: var(--pg-text); min-height: 100vh; }
    .site-header {
      background: var(--pg-bg);
      border-bottom: 1px solid var(--pg-border);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .site-header-inner {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    .site-logo {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--pg-text);
      text-decoration: none;
      letter-spacing: -0.3px;
    }
    .site-logo:hover { color: var(--pg-accent); }
    .site-nav { display: flex; gap: 8px; }
    .site-nav a {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      color: var(--pg-text-secondary);
      text-decoration: none;
      border-radius: 6px;
      transition: all 0.15s;
    }
    .site-nav a:hover { color: var(--pg-text); background: rgba(0,0,0,0.05); }
    .site-nav a.active { background: var(--pg-accent-muted); color: var(--pg-accent); }
    #swagger-ui { padding: 24px; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="/docs" class="site-logo">GeneAI</a>
      <nav class="site-nav">
        <a href="/docs" id="nav-home">Home</a>
        <a href="/docs/api" id="nav-api" class="active">API Endpoints</a>
        <a href="/docs#setup" id="nav-setup">Setup Guide</a>
        <a href="/docs#run" id="nav-run">Run Guide</a>
        <a href="/demo" id="nav-demo">Demo</a>
      </nav>
    </div>
  </header>

  <div id="swagger-ui" style="position:relative;z-index:1"></div>

  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
  <script>
    window.ui = SwaggerUIBundle({
      url: '/openapi.json',
      dom_id: '#swagger-ui',
      deepLinking: true,
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
      layout: 'StandaloneLayout',
      defaultModelsExpandDepth: 0,
      docExpansion: 'list',
      filter: true,
      syntaxHighlight: { theme: 'arta' },
      tryItOutEnabled: true
    });
    (function setFilterPlaceholder(attempt) {
      attempt = attempt || 0;
      var input = document.querySelector('.swagger-ui .filter-container input, .swagger-ui .filter input');
      if (input && !input.getAttribute('data-placeholder-set')) {
        input.setAttribute('placeholder', 'Filter by tag or endpoint...');
        input.setAttribute('data-placeholder-set', '1');
      } else if (!input && attempt < 50) {
        setTimeout(function() { setFilterPlaceholder(attempt + 1); }, 150);
      }
    })();
  </script>
  <script>
    (function() {
      function setActive() {
        var path = window.location.pathname;
        var hash = window.location.hash || '';
        document.querySelectorAll('.site-nav a').forEach(function(a) {
          a.classList.remove('active');
          if (path === '/docs/api') {
            if (a.id === 'nav-api') a.classList.add('active');
          } else if (path === '/docs') {
            if (hash === '#setup' && a.id === 'nav-setup') a.classList.add('active');
            else if (hash === '#run' && a.id === 'nav-run') a.classList.add('active');
            else if (!hash && a.id === 'nav-home') a.classList.add('active');
          } else if (path === '/demo' && a.id === 'nav-demo') a.classList.add('active');
        });
      }
      setActive();
      window.addEventListener('hashchange', setActive);
    })();
  </script>
</body>
</html>
